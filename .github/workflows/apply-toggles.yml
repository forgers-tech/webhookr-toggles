name: Apply Toggles

run-name: "Apply · ${{ inputs.environment || 'active envs' }}${{ inputs.dry_run && ' (dry-run)' || '' }}"

# Applies toggles.yaml to Unleash. On merge to main the active environments
# (config/environments.yaml) are applied automatically; workflow_dispatch can
# target any environment and supports a dry run. The apply job runs under a
# GitHub Environment so protection rules (e.g. prd approval) gate the change.
on:
  push:
    branches: [main]
    paths:
      - toggles.yaml
      - config/environments.yaml
      - src/**
      - .github/workflows/apply-toggles.yml
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [prd, qa]
        default: prd
      dry_run:
        description: Print the plan without applying
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: apply-toggles-${{ github.event.inputs.environment || 'active' }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.set.outputs.envs }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "envs=[\"${{ inputs.environment }}\"]" >> "$GITHUB_OUTPUT"
          else
            echo "envs=$(node src/list-active-envs.ts)" >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: plan
    if: needs.plan.outputs.envs != '[]'
    runs-on: ubuntu-latest
    environment: ${{ matrix.env }}
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.plan.outputs.envs) }}
    env:
      UNLEASH_URL: ${{ secrets.UNLEASH_URL }}
      UNLEASH_API_TOKEN: ${{ secrets.UNLEASH_API_TOKEN }}
      TARGET_ENV: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # The Unleash admin API is reachable only over the tailnet; join it as an
      # ephemeral tag:ci node (the tailnet ACL is flat, so 443 is reachable).
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Apply
        run: npm run apply -- ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
