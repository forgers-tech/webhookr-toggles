# Declarative source of truth for Webhookr feature toggles.
#
# Final Unleash name is computed as: webhookr.<service>.<name>
# The environment is NOT part of the name — each environment maps to its own
# Unleash environment (see config/environments.yaml). States are declared per
# logical environment (prd, qa) and applied by the Apply Toggles workflow.
#
# Allowed services: web, bff, svc, ingest.
# Name pattern: lowercase kebab-case (^[a-z][a-z0-9]*(-[a-z0-9]+)*$).
toggles:
  - service: svc
    name: processor-engine
    description: Enables the event processor engine.
    states:
      prd: true
      qa: false

  - service: web
    name: new-dashboard
    description: Enables the new dashboard layout.
    states:
      prd: false
      qa: false

  - service: web
    name: event-timeline
    description: Renders the per-event processor execution timeline panel on the event detail screen.
    states:
      prd: false
      qa: false

  - service: svc
    name: force-send
    description: Enables the force-send (manual delivery override) endpoint; authoritative kill-switch for the capability.
    states:
      prd: false
      qa: false

  - service: web
    name: force-send
    description: Shows the force-send action on blocked events in the event detail screen (UI gate; the svc flag is the hard kill-switch).
    states:
      prd: false
      qa: false
